services:
  postgres:
    image: postgres:16-alpine
    container_name: ef-postgres
    environment:
      POSTGRES_USER: ebook
      POSTGRES_PASSWORD: ebook
      POSTGRES_DB: ebook_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebook -d ebook_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ef-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ef-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ebook
      MINIO_ROOT_PASSWORD: ebook-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-web:
    image: langfuse/langfuse:latest
    container_name: ef-langfuse
    environment:
      DATABASE_URL: postgresql://ebook:ebook@postgres:5432/ebook_factory
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
