# Ebook Factory - Produção
# Documentação: docs/deployment.md

services:
  caddy:
    image: caddy:2-alpine
    container_name: ef-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - ef-network

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: ef-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.ebook-factory.com
      NEXT_PUBLIC_LANGFUSE_HOST: https://langfuse.ebook-factory.com
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    networks:
      - ef-network

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: ef-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - ef-network

  worker:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: ef-worker
    restart: unless-stopped
    entrypoint: ["python", "-m", "src.app.workers.runner"]
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - ef-network

  postgres:
    image: postgres:16-alpine
    container_name: ef-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ef-network

  redis:
    image: redis:7-alpine
    container_name: ef-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ef-network

  minio:
    image: minio/minio:latest
    container_name: ef-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ef-network

  langfuse:
    image: langfuse/langfuse:latest
    container_name: ef-langfuse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: https://langfuse.ebook-factory.com
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ef-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ef-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ef-network

  grafana:
    image: grafana/grafana:latest
    container_name: ef-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_INSTALL_PLUGINS: ""
    networks:
      - ef-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  ef-network:
    name: ebook-factory-network
    driver: bridge
